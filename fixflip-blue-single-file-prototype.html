<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FixFlip Blue Single-File Prototype</title>
  <style>
    :root {
      --ink: #141414;
      --muted: #5f6f82;
      --line: #d7e0ea;
      --paper: #f6f9fc;
      --white: #ffffff;
      --signal: #2f80ed;
      --navy: #12365f;
      --steel: #5d7fa6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    a { color: inherit; text-decoration: none; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 28px;
      align-items: center;
      min-height: 78px;
      padding: 0 clamp(18px, 4vw, 54px);
      border-bottom: 1px solid rgba(20, 20, 20, .1);
      background: rgba(246, 249, 252, .96);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 188px;
    }

    .brand img {
      width: 138px;
      height: auto;
      display: block;
    }

    .brand span {
      width: 9px;
      height: 9px;
      background: var(--signal);
      border-radius: 999px;
      box-shadow: 18px 0 0 var(--navy), 36px 0 0 var(--steel);
    }

    .label {
      justify-self: end;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, .78fr) minmax(280px, .42fr);
      gap: 28px;
      align-items: end;
      padding: clamp(28px, 4vw, 50px) clamp(18px, 4vw, 54px);
      border-bottom: 1px solid var(--line);
      background: var(--white);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 6vw, 78px);
      line-height: .9;
      text-transform: uppercase;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
      border-bottom: 1px solid var(--line);
    }

    .tab {
      min-height: 64px;
      border: 0;
      background: var(--paper);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .tab[aria-selected="true"] {
      background: var(--signal);
      color: var(--white);
    }

    .viewer {
      min-height: 760px;
      padding: clamp(12px, 2vw, 24px);
      background: #10243d;
    }

    iframe {
      width: 100%;
      height: min(1200px, calc(100vh - 220px));
      min-height: 720px;
      display: block;
      border: 1px solid rgba(255, 255, 255, .22);
      background: var(--paper);
    }

    @media (max-width: 760px) {
      .topbar,
      .intro,
      .tabs {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 16px;
      }

      .label {
        justify-self: start;
      }

      .brand img {
        width: 116px;
      }

      iframe {
        height: 740px;
        min-height: 740px;
      }
    }
  </style>
</head>

    "<!doctype html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>FixFlip Materials Market | Blue Theme</title>\n  <style>\n    :root {\n      --ink: #141414;\n      --muted: #5f6f82;\n      --line: #d7e0ea;\n      --paper: #f6f9fc;\n      --white: #ffffff;\n      --signal: #2f80ed;\n      --signal-dark: #1d5fb8;\n      --forest: #12365f;\n      --clay: #5d7fa6;\n      --steel: #65727a;\n      --blue: #1e5d9e;\n      --shadow: 0 24px 70px rgba(22, 22, 18, .13);\n    }\n\n    * {\n      box-sizing: border-box;\n    }\n\n    body {\n      margin: 0;\n      color: var(--ink);\n      background: var(--paper);\n      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n      line-height: 1.4;\n    }\n\n    a {\n      color: inherit;\n      text-decoration: none;\n    }\n\n    button {\n      font: inherit;\n    }\n\n    .site-shell {\n      min-height: 100vh;\n      overflow: hidden;\n    }\n\n    .topbar {\n      position: sticky;\n      top: 0;\n      z-index: 10;\n      display: grid;\n      grid-template-columns: auto 1fr auto;\n      gap: 28px;\n      align-items: center;\n      min-height: 78px;\n      padding: 0 clamp(18px, 4vw, 54px);\n      border-bottom: 1px solid rgba(20, 20, 20, .1);\n      background: rgba(246, 249, 252, .92);\n      backdrop-filter: blur(18px);\n    }\n\n    .brand {\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      min-width: 188px;\n    }\n\n    .brand img {\n      width: 138px;\n      height: auto;\n      display: block;\n    }\n\n    .brand span {\n      width: 9px;\n      height: 9px;\n      background: var(--signal);\n      border-radius: 999px;\n      box-shadow: 18px 0 0 var(--forest), 36px 0 0 var(--clay);\n    }\n\n    .nav {\n      display: flex;\n      justify-content: center;\n      gap: clamp(18px, 3vw, 42px);\n      font-size: 13px;\n      font-weight:     "<!doctype html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>More Materials | FixFlip Materials Market | Blue Theme</title>\n  <style>\n    :root {\n      --ink: #141414;\n      --muted: #5f6f82;\n      --line: #d7e0ea;\n      --paper: #f6f9fc;\n      --white: #ffffff;\n      --signal: #2f80ed;\n      --forest: #12365f;\n      --clay: #5d7fa6;\n      --blue: #1e5d9e;\n    }\n\n    * { box-sizing: border-box; }\n\n    body {\n      margin: 0;\n      color: var(--ink);\n      background: var(--paper);\n      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n      line-height: 1.4;\n    }\n\n    a { color: inherit; text-decoration: none; }\n\n    .topbar {\n      position: sticky;\n      top: 0;\n      z-index: 10;\n      display: grid;\n      grid-template-columns: auto 1fr auto;\n      gap: 28px;\n      align-items: center;\n      min-height: 78px;\n      padding: 0 clamp(18px, 4vw, 54px);\n      border-bottom: 1px solid rgba(20, 20, 20, .1);\n      background: rgba(246, 249, 252, .94);\n      backdrop-filter: blur(18px);\n    }\n\n    .brand {\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      min-width: 188px;\n    }\n\n    .brand img {\n      width: 138px;\n      height: auto;\n      display: block;\n    }\n\n    .brand span {\n      width: 9px;\n      height: 9px;\n      background: var(--signal);\n      border-radius: 999px;\n      box-shadow: 18px 0 0 var(--forest), 36px 0 0 var(--clay);\n    }\n\n    .nav {\n      display: flex;\n      justify-content: center;\n      gap: clamp(16px, 2.2vw, 34px);\n      font-size: 13px;\n      font-weight: 750;\n      letter-spacing: .05em;\n      text-transform: uppercase;\n    }\n\n    .nav a {\n      padding: 29px 0;\n      border-bottom: 3px solid transparent;\n    }\n\n    .nav a:hover,\n    .nav a:focus-visible {\n      border-color: var(--signal);\n      outline: 0;\n    }\n\n    .back {\n      display: inline-flex;\n      align-items: center;\n      min-height: 44px;\n      padding: 0 16px;\n      border: 1px solid var(--ink);\n      border-radius: 4px;\n      background: var(--ink);\n      color: var(--white);\n      font-size: 13px;\n      font-weight: 850;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n\n    .hero {\n      display: grid;\n      grid-template-columns: minmax(0, .85fr) minmax(360px, .68fr);\n      min-height: calc(88vh - 78px);\n      border-bottom: 1px solid var(--line);\n    }\n\n    .copy {\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n      padding: clamp(54px, 7vw, 104px) clamp(22px, 5vw, 74px);\n    }\n\n    .eyebrow {\n      display: flex;\n      align-items: center;\n      gap: 11px;\n      margin: 0 0 22px;\n      color: var(--muted);\n      font-size: 13px;\n      font-weight: 850;\n      letter-spacing: .1em;\n      text-transform: uppercase;\n    }\n\n    .eyebrow::before {\n      content: \"\";\n      width: 48px;\n      height: 5px;\n      background: var(--signal);\n    }\n\n    h1 {\n      max-width: 860px;\n      margin: 0;\n      font-size: clamp(48px, 8vw, 112px);\n      line-height: .86;\n      letter-spacing: 0;\n      text-transform: uppercase;\n    }\n\n    .copy > p:not(.eyebrow) {\n      max-width: 660px;\n      margin: 28px 0 0;\n      color: #26384a;\n      font-size: clamp(18px, 2vw, 23px);\n    }\n\n    .actions {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 14px;\n      margin-top: 36px;\n    }\n\n    .primary,\n    .secondary,\n    .mini-action {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 52px;\n      padding: 0 22px;\n      border-radius: 4px;\n      border: 1px solid var(--ink);\n      font-size: 13px;\n      font-weight: 850;\n      letter-spacing: .06em;\n      text-transform: uppercase;\n    }\n\n    .primary {\n      background: var(--signal);\n      box-shadow: 8px 8px 0 var(--ink);\n    }\n\n    .secondary { background: transparent; }\n\n    .visual {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      background: var(--ink);\n      color: var(--white);\n    }\n\n    .visual-tile {\n      position: relative;\n      min-height: 250px;\n      padding: 22px;\n      overflow: hidden;\n      border-left: 1px solid rgba(255, 255, 255, .14);\n      border-bottom: 1px solid rgba(255, 255, 255, .14);\n    }\n\n    .visual-tile::before {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      background: var(--texture);\n      opacity: .95;\n      transition: transform .45s ease;\n    }\n\n    .visual-tile:hover::before { transform: scale(1.08); }\n\n    .visual-tile span,\n    .visual-tile strong {\n      position: relative;\n      z-index: 1;\n      display: block;\n      text-shadow: 0 1px 12px rgba(0, 0, 0, .34);\n    }\n\n    .visual-tile span {\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .08em;\n      text-transform: uppercase;\n    }\n\n    .visual-tile strong {\n      margin-top: 8px;\n      font-size: clamp(28px, 3vw, 46px);\n      line-height: .92;\n      text-transform: uppercase;\n    }\n\n    .section {\n      padding: clamp(54px, 7vw, 96px) clamp(22px, 5vw, 74px);\n      border-bottom: 1px solid var(--line);\n    }\n\n    .section-head {\n      display: grid;\n      grid-template-columns: minmax(0, .8fr) minmax(280px, .45fr);\n      gap: 34px;\n      align-items: end;\n      margin-bottom: 34px;\n    }\n\n    .section h2 {\n      margin: 0;\n      font-size: clamp(34px, 5vw, 76px);\n      line-height: .92;\n      text-transform: uppercase;\n    }\n\n    .section-head p {\n      margin: 0;\n      color: var(--muted);\n      font-size: 17px;\n    }\n\n    .material-grid {\n      display: grid;\n      grid-template-columns: repeat(4, minmax(0, 1fr));\n      gap: 1px;\n      background
